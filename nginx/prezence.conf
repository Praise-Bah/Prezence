# Prezence — nginx reverse proxy config
# Drop this file into /etc/nginx/sites-available/ and symlink to sites-enabled/

# ── API ──────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.prezence.app;

    # Redirect HTTP → HTTPS (certbot will fill in the SSL block below)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.prezence.app;

    # SSL managed by certbot — leave these as placeholders:
    ssl_certificate     /etc/letsencrypt/live/api.prezence.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prezence.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }
}

# ── Web ───────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name prezence.app www.prezence.app;

    return 301 https://prezence.app$request_uri;
}

server {
    listen 443 ssl;
    server_name prezence.app www.prezence.app;

    ssl_certificate     /etc/letsencrypt/live/prezence.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prezence.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }
}
